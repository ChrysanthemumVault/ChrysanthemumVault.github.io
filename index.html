<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chrysanthemum Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a133;
  --gold-bright:#e8c97a;
  --gold-dim:#7a5e1a;
  --bg:#0a0c0f;
}
html,body{
  width:100%;height:100%;
  background:var(--bg);
  color:var(--gold);
  font-family:'Cormorant Garamond',serif;
  overflow-x:hidden;
}

/* ════ NAVBAR ════ */
.navbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;height:78px;
  background:rgba(8,9,12,0.97);
  border-bottom:1px solid rgba(201,161,51,0.28);
}
.logo-group{display:flex;align-items:center;gap:13px}
.logo-circle{
  width:52px;height:52px;
  border:1px solid rgba(201,161,51,0.7);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-wordmark .top{
  display:block;font-family:'Cinzel',serif;font-size:11.5px;
  letter-spacing:0.18em;color:var(--gold-bright);font-weight:400;line-height:1.3;
}
.logo-wordmark .est{
  display:flex;align-items:center;gap:7px;margin-top:4px;
  font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:0.32em;color:var(--gold-dim);
}
.logo-wordmark .est::before,.logo-wordmark .est::after{
  content:'';flex:1;height:1px;background:var(--gold-dim);max-width:24px;
}
.nav-links{display:flex;align-items:center;list-style:none}
.nav-links li{display:flex;align-items:center}
.nav-links li+li::before{
  content:'|';color:rgba(201,161,51,0.38);margin:0 20px;font-size:11px;
}
.nav-links a{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.22em;
  color:var(--gold);text-decoration:none;transition:color .25s;
}
.nav-links a:hover{color:var(--gold-bright)}
.nav-inquire{
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.28em;
  color:var(--gold);border:1px solid var(--gold);background:transparent;
  padding:10px 24px;cursor:pointer;transition:all .25s;
}
.nav-inquire:hover{background:var(--gold);color:#080a0d}

/* ════ PAGE ════ */
.page{padding-top:78px;min-height:100vh;display:flex;flex-direction:column}

/* Outer border frame */
.outer-frame{
  position:relative;
  margin:13px 18px 18px;
  border:1px solid rgba(201,161,51,0.32);
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  min-height:calc(100vh - 78px - 31px);
}
/* corner ornaments */
.outer-frame::before,.outer-frame::after,
.fc::before,.fc::after{
  content:'';position:absolute;width:20px;height:20px;
  border-color:var(--gold);border-style:solid;z-index:20;
}
.outer-frame::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.outer-frame::after {top:-1px;right:-1px;border-width:2px 2px 0 0}
.fc::before{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.fc::after {bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.fc{position:absolute;inset:0;pointer-events:none;z-index:20}

/* ════ BACKGROUND CANVAS ════ */
#bg-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* Faint arc lines bottom-left */
.geo-arc{
  position:absolute;bottom:0;left:0;
  width:200px;height:260px;
  pointer-events:none;z-index:1;opacity:0.15;
}

/* ════ HERO ════ */
.hero{
  position:relative;z-index:2;
  flex:1;display:flex;flex-direction:column;align-items:center;
}

/* Flower + ellipses */
.flower-wrap{
  position:relative;
  width:100%;flex:1;
  display:flex;justify-content:center;align-items:flex-end;
  padding-top:28px;
}
.flower-svg{
  width:min(800px,90vw);
  animation:float 7s ease-in-out infinite;
  filter:drop-shadow(0 0 50px rgba(201,161,51,0.22));
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}

/* ════ HORIZON ════ */
.horizon{position:relative;z-index:3;width:100%}
.h-line{
  width:100%;height:1px;
  background:linear-gradient(90deg,
    transparent 0%,rgba(201,161,51,0.25) 12%,
    rgba(232,201,122,0.85) 38%,#fff8d8 50%,
    rgba(232,201,122,0.85) 62%,rgba(201,161,51,0.25) 88%,transparent 100%);
  box-shadow:
    0 0 6px 2px rgba(255,235,160,0.65),
    0 0 24px 6px rgba(201,161,51,0.45),
    0 0 70px 20px rgba(201,161,51,0.18);
}
.h-burst{
  position:absolute;left:50%;top:0;
  transform:translate(-50%,-50%);
  width:5px;height:5px;background:#fff8c8;
  clip-path:polygon(50% 0%,54% 46%,100% 50%,54% 54%,50% 100%,46% 54%,0% 50%,46% 46%);
  box-shadow:0 0 10px 5px rgba(255,235,150,0.8),0 0 30px 14px rgba(201,161,51,0.6);
}

/* ════ TITLE ════ */
.title{
  position:relative;z-index:3;
  font-family:'Cinzel',serif;font-weight:400;
  font-size:clamp(18px,3.2vw,42px);
  letter-spacing:0.42em;color:#d4aa50;
  text-align:center;padding:24px 20px 5px;
  text-shadow:0 0 35px rgba(201,161,51,0.3);
}
.title-dot{
  display:block;text-align:center;z-index:3;position:relative;
  font-size:10px;color:var(--gold-dim);margin-bottom:6px;
}

/* ════ CATEGORIES ════ */
.cats{
  position:relative;z-index:3;width:100%;
  display:grid;grid-template-columns:repeat(6,1fr);
  border-top:1px solid rgba(201,161,51,0.28);
}
.cat{
  display:flex;flex-direction:column;align-items:center;
  border-right:1px solid rgba(201,161,51,0.28);
  text-decoration:none;cursor:pointer;
  transition:background .3s;
}
.cat:last-child{border-right:none}
.cat:hover{background:rgba(201,161,51,0.05)}

/* connector line from border up to sparkle */
.c-line{
  width:1px;height:46px;
  background:linear-gradient(180deg,transparent,rgba(201,161,51,0.45));
}
/* 4-pointed sparkle */
.c-star{
  width:10px;height:10px;margin-bottom:8px;flex-shrink:0;
  fill:var(--gold-bright);
}
/* icon box */
.c-box{
  position:relative;width:84px;height:84px;
  border:1px solid rgba(201,161,51,0.38);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:13px;transition:border-color .3s,box-shadow .3s;
}
.c-box::before,.c-box::after{
  content:'';position:absolute;width:11px;height:11px;
  border-color:var(--gold);border-style:solid;
}
.c-box::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.c-box::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.cat:hover .c-box{border-color:rgba(201,161,51,0.75);box-shadow:0 0 18px rgba(201,161,51,0.18)}
/* circle inside box */
.c-ring{
  position:absolute;width:58px;height:58px;border-radius:50%;
  border:1px solid rgba(201,161,51,0.32);transition:border-color .3s;
}
.cat:hover .c-ring{border-color:rgba(201,161,51,0.6)}
.c-icon{
  width:33px;height:33px;stroke:var(--gold);fill:none;stroke-width:1.1;
  position:relative;z-index:1;transition:stroke .3s;
}
.cat:hover .c-icon{stroke:var(--gold-bright)}
.c-label{
  font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:0.32em;
  color:var(--gold);transition:color .3s;padding-bottom:24px;
}
.cat:hover .c-label{color:var(--gold-bright)}

/* ════ MODAL ════ */
.modal-bg{
  position:fixed;inset:0;z-index:500;
  background:rgba(5,6,9,0.93);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  position:relative;width:min(640px,90vw);
  border:1px solid rgba(201,161,51,0.4);
  background:#08090d;padding:52px 48px 44px;
}
.modal::before,.modal::after,.mc-bl,.mc-br{
  content:'';position:absolute;width:16px;height:16px;
  border-color:var(--gold);border-style:solid;
}
.modal::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.modal::after{top:-1px;right:-1px;border-width:2px 2px 0 0}
.mc-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.mc-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.m-close{
  position:absolute;top:16px;right:20px;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.25em;
  color:var(--gold-dim);background:none;border:none;cursor:pointer;transition:color .2s;
}
.m-close:hover{color:var(--gold-bright)}
.modal h2{
  font-family:'Cinzel',serif;font-size:20px;font-weight:400;
  letter-spacing:0.32em;color:var(--gold-bright);
  border-bottom:1px solid rgba(201,161,51,0.22);
  padding-bottom:18px;margin-bottom:20px;
}
.modal p{font-size:17px;line-height:1.85;color:rgba(201,161,51,0.68);margin-bottom:12px}

@media(max-width:700px){
  .cats{grid-template-columns:repeat(3,1fr)}
  .cat:nth-child(3){border-right:none}
  .cat:nth-child(n+4){border-top:1px solid rgba(201,161,51,0.28)}
  .nav-links{display:none}
  .navbar{padding:0 16px}
}
</style>
</head>
<body>

<!-- ══ PAGE ══ -->

        <svg class="c-star" viewBox="0 0 10 10"><path d="M5 0L5.7 4.3L10 5L5.7 5.7L5 10L4.3 5.7L0 5L4.3 4.3Z"/></svg>

            <line x1="31" y1="4"  x2="33.5" y2="22" stroke-width="1.1"/>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">

<script>
/* ── STARFIELD + NOISE BACKGROUND ── */
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W,H,stars=[];

  function resize(){
    const parent = canvas.parentElement;
    W = canvas.width  = parent.offsetWidth;
    H = canvas.height = parent.offsetHeight;
    buildStars();
  }

  function buildStars(){
    stars=[];
    const n = Math.max(120, Math.floor(W*H/2800));
    for(let i=0;i<n;i++){
      stars.push({
        x:Math.random()*W, y:Math.random()*H,
        r:Math.random()*1.5+0.2,
        phase:Math.random()*Math.PI*2,
        speed:Math.random()*0.007+0.002,
        gold:Math.random()>0.52,
        big:Math.random()>0.85
      });
    }
  }

  function drawNoise(ctx,w,h){
    const id=ctx.createImageData(w,h);
    const d=id.data;
    for(let i=0;i<d.length;i+=4){
      const v=Math.random()*14|0;
      d[i]=d[i+1]=d[i+2]=v;
      d[i+3]=Math.random()>0.97?28:6;
    }
    ctx.putImageData(id,0,0);
  }

  let t=0;
  function animate(){
    ctx.clearRect(0,0,W,H);
    drawNoise(ctx,W,H);

    /* Nebula glow — warm centre */
    const ng=ctx.createRadialGradient(W*.47,H*.38,0,W*.47,H*.38,W*.5);
    ng.addColorStop(0,'rgba(90,65,18,0.11)');
    ng.addColorStop(0.5,'rgba(45,30,6,0.06)');
    ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);

    /* Stars */
    stars.forEach(s=>{
      const a=0.2+0.8*(0.5+0.5*Math.sin(t*s.speed+s.phase));
      ctx.save(); ctx.globalAlpha=a;
      if(s.big){
        /* 4-pointed sparkle */
        ctx.fillStyle=s.gold?'#e8c97a':'#fff8ef';
        const d=s.r*5.5;
        ctx.beginPath();
        ctx.moveTo(s.x,s.y-d);
        ctx.lineTo(s.x+0.55,s.y-0.55);
        ctx.lineTo(s.x+d,s.y);
        ctx.lineTo(s.x+0.55,s.y+0.55);
        ctx.lineTo(s.x,s.y+d);
        ctx.lineTo(s.x-0.55,s.y+0.55);
        ctx.lineTo(s.x-d,s.y);
        ctx.lineTo(s.x-0.55,s.y-0.55);
        ctx.closePath(); ctx.fill();
      } else {
        ctx.fillStyle=s.gold?'rgba(201,161,51,0.85)':'rgba(255,245,225,0.65)';
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    });
    t+=0.016;
    requestAnimationFrame(animate);
  }

  new ResizeObserver(resize).observe(canvas.parentElement);
  resize();
  animate();
})();

/* ── MODAL ── */
